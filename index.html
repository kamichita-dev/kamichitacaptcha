<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Hello</title>
</head>
<body>

<h1 id="text"></h1>

<script>
const message = "Hello World!";
const speed = 100;
const delay = 1500;

let i = 0;
let isDeleting = false;

function type() {
  const el = document.getElementById("text");

  if (!isDeleting) {
    el.textContent = message.substring(0, i++);
    if (i > message.length) {
      isDeleting = true;
      setTimeout(type, delay);
      return;
    }
  } else {
    el.textContent = message.substring(0, i--);
    if (i < 0) {
      isDeleting = false;
      i = 0;
    }
  }

  setTimeout(type, isDeleting ? speed / 2 : speed);
}

type();
</script>

</body>
</html>
